name: Maintenance verification

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/maintenance-source-snapshot.yml"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Archive tracked source
        shell: bash
        run: git ls-files -z | tar --null -T - -czf repository-source.tar.gz

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-source-${{ github.sha }}
          path: repository-source.tar.gz
          if-no-files-found: error
          retention-days: 1

  full-python-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install complete test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-asyncio pip-audit
          python -m pip check
          cp trading/config/kis_devlp.yaml.example trading/config/kis_devlp.yaml

      - name: Run Korean and shared tests
        run: python -m pytest tests cores/llm/tests -q

      - name: Run US tests in isolated import context
        working-directory: prism-us
        run: PYTHONPATH=. python -m pytest tests -q

      - name: Run BTC tests in isolated import context
        working-directory: prism-btc
        run: PYTHONPATH=. python -m pytest tests -q

      - name: Audit installed Python dependencies
        run: pip-audit --local
