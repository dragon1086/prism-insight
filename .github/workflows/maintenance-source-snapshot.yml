name: Maintenance verification

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/maintenance-source-snapshot.yml"

permissions:
  contents: read

jobs:
  full-python-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install complete test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-asyncio pip-audit
          python -m pip check
          cp trading/config/kis_devlp.yaml.example trading/config/kis_devlp.yaml

      - name: Run complete verification
        shell: bash
        run: |
          set +e

          python -m pytest tests cores/llm/tests -q
          root_status=$?

          (cd prism-us && PYTHONPATH=. python -m pytest tests -q)
          us_status=$?

          (cd prism-btc && PYTHONPATH=. python -m pytest tests -q)
          btc_status=$?

          pip-audit --local
          audit_status=$?

          echo "root=$root_status us=$us_status btc=$btc_status audit=$audit_status"
          if (( root_status || us_status || btc_status || audit_status )); then
            exit 1
          fi
