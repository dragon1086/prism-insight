name: Autonomous maintainer regime composition PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  patch-and-verify:
    if: github.head_ref == 'autonomous-maintainer/20260712-regime-flag-composition'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply patch and add regression coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_function(path, replacement):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              start = text.index("def _get_regime_slots(market_regime: str) -> tuple:")
              end = text.index("\ndef _build_topdown_pool", start)
              current = text[start:end]
              replacement = replacement.rstrip()
              if current.rstrip() == replacement:
                  print(f"{path}: already patched")
                  return
              p.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
              print(f"{path}: patched")

          kr = '''def _get_regime_slots(market_regime: str) -> tuple:
    """Return entry slots after cumulatively applying all active restrictions."""
    REGIME_SLOTS = {
        "strong_bull": (2, 1),
        "moderate_bull": (1, 2),
        "sideways": (1, 2),
        "moderate_bear": (1, 2),
        "strong_bear": (0, 3),
    }
    td, bu = REGIME_SLOTS.get(market_regime, (1, 2))

    # This safety gate must run before the pilot cap. Returning from the pilot first
    # would re-enable a top-down slot when both restrictions are active.
    if (td > 0 and market_regime in ("sideways", "moderate_bear")
            and os.getenv("REGIME_WEAK_NO_TOPDOWN", "false").strip().lower()
            in ("1", "true", "yes", "on")):
        logger.info("[REGIME_SLOTS] weak-regime top-down 억제: %s (%d,%d)->(0,%d)",
                    market_regime, td, bu, bu)
        td = 0

    try:
        from cores.regime_policy import pilot_reexposure_active
        if (td + bu) > 1 and pilot_reexposure_active("kr"):
            capped = (1, 0) if td >= 1 else (0, min(bu, 1))
            logger.info("[PULSE_PILOT] 파일럿 신규진입 캡: %s (%d,%d)->(%d,%d)",
                        market_regime, td, bu, capped[0], capped[1])
            return capped
    except Exception as exc:
        logger.debug("[PULSE_PILOT] slot-cap fail-open: %s", exc)
    return (td, bu)
'''

          us = '''def _get_regime_slots(market_regime: str) -> tuple:
    """Return entry slots after cumulatively applying all active restrictions."""
    REGIME_SLOTS = {
        "strong_bull": (2, 1),
        "moderate_bull": (1, 2),
        "sideways": (1, 2),
        "moderate_bear": (1, 2),
        "strong_bear": (0, 3),
    }
    td, bu = REGIME_SLOTS.get(market_regime, (1, 2))

    # Keep KR/US semantics identical: the weak-regime gate narrows the candidate
    # classes first, then the pilot limits the remaining total to one entry.
    if (td > 0 and market_regime in ("sideways", "moderate_bear")
            and os.getenv("REGIME_WEAK_NO_TOPDOWN", "false").strip().lower()
            in ("1", "true", "yes", "on")):
        logger.info("[REGIME_SLOTS] weak-regime top-down 억제: %s (%d,%d)->(0,%d)",
                    market_regime, td, bu, bu)
        td = 0

    try:
        policy = _load_root_regime_policy()
        if (td + bu) > 1 and policy is not None and policy.pilot_reexposure_active("us"):
            capped = (1, 0) if td >= 1 else (0, min(bu, 1))
            logger.info("[PULSE_PILOT] 파일럿 신규진입 캡: %s (%d,%d)->(%d,%d)",
                        market_regime, td, bu, capped[0], capped[1])
            return capped
    except Exception as exc:
        logger.debug("[PULSE_PILOT] slot-cap fail-open: %s", exc)
    return (td, bu)
'''

          replace_function("trigger_batch.py", kr)
          replace_function("prism-us/us_trigger_batch.py", us)

          Path("tests/test_regime_slot_policy_composition.py").write_text('''"""Lightweight regression coverage for entry-slot flag composition."""
import ast
import logging
import os
import sys
import types
from pathlib import Path

import pytest

ROOT = Path(__file__).resolve().parents[1]
CASES = [
    ("sideways", False, False, (1, 2)),
    ("sideways", False, True, (0, 2)),
    ("sideways", True, False, (1, 0)),
    ("sideways", True, True, (0, 1)),
    ("moderate_bear", True, True, (0, 1)),
    ("moderate_bull", True, True, (1, 0)),
    ("strong_bear", True, True, (0, 1)),
]


def load_function(path, extra):
    tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
    node = next(n for n in tree.body if isinstance(n, ast.FunctionDef) and n.name == "_get_regime_slots")
    module = ast.Module(body=[node], type_ignores=[])
    ast.fix_missing_locations(module)
    namespace = {"os": os, "logger": logging.getLogger(path.stem), **extra}
    exec(compile(module, str(path), "exec"), namespace)
    return namespace["_get_regime_slots"]


def install_kr_policy(monkeypatch, active):
    cores = types.ModuleType("cores")
    cores.__path__ = []
    policy = types.ModuleType("cores.regime_policy")
    policy.pilot_reexposure_active = lambda market: active
    cores.regime_policy = policy
    monkeypatch.setitem(sys.modules, "cores", cores)
    monkeypatch.setitem(sys.modules, "cores.regime_policy", policy)


class USPolicy:
    def __init__(self, active):
        self.active = active

    def pilot_reexposure_active(self, market):
        return self.active


@pytest.mark.parametrize("regime,pilot,weak,expected", CASES)
def test_kr_composition(monkeypatch, regime, pilot, weak, expected):
    install_kr_policy(monkeypatch, pilot)
    monkeypatch.setenv("REGIME_WEAK_NO_TOPDOWN", "true" if weak else "false")
    function = load_function(ROOT / "trigger_batch.py", {})
    assert function(regime) == expected


@pytest.mark.parametrize("regime,pilot,weak,expected", CASES)
def test_us_composition(monkeypatch, regime, pilot, weak, expected):
    monkeypatch.setenv("REGIME_WEAK_NO_TOPDOWN", "true" if weak else "false")
    policy = USPolicy(pilot)
    function = load_function(
        ROOT / "prism-us" / "us_trigger_batch.py",
        {"_load_root_regime_policy": lambda: policy},
    )
    assert function(regime) == expected
''', encoding="utf-8")

          ci = Path(".github/workflows/ci.yml")
          text = ci.read_text(encoding="utf-8")
          old = "      - name: Run tests\n        run: python -m pytest cores/llm/tests/ -q\n"
          new = "      - name: Run tests\n        run: |\n          python -m pytest cores/llm/tests/ -q\n          python -m pytest tests/test_regime_slot_policy_composition.py -q\n"
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit("CI test command did not match expected baseline")
              ci.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Verify focused behavior
        run: |
          python -m pip install pytest
          python -m pytest tests/test_regime_slot_policy_composition.py -q
          python -m compileall -q trigger_batch.py prism-us/us_trigger_batch.py tests/test_regime_slot_policy_composition.py
          git diff --check

      - name: Commit verified patch
        run: |
          set -euo pipefail
          git config user.name "autonomous-maintainer[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trigger_batch.py prism-us/us_trigger_batch.py tests/test_regime_slot_policy_composition.py .github/workflows/ci.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: compose regime entry-slot restrictions"
          git push origin HEAD:${GITHUB_HEAD_REF}
