            return capped
    except Exception as _pe:
        logger.debug("[PULSE_PILOT] slot-cap fail-open: %s", _pe)
    # 약세·횡보장 모멘텀추격(top-down) 억제 옵션 (env-gated, 기본 off = 현행 유지).
