          test_path = Path("tests/test_regime_slot_policy_composition.py")
          test_path.write_text(r'''"""Regression tests for composing independent entry-slot restrictions.

The production batch modules have heavy market-data imports. These tests execute the exact
``_get_regime_slots`` function bodies from their source AST with only their external policy
lookups stubbed, so the flag-composition contract remains part of the lightweight CI suite.
"""
from __future__ import annotations

import ast
import logging
import os
import sys
import types
from pathlib import Path

import pytest

ROOT = Path(__file__).resolve().parents[1]


def _load_function(path: Path, name: str, namespace: dict):
    tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
    function = next(
        node for node in tree.body if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)) and node.name == name
    )
    module = ast.Module(body=[function], type_ignores=[])
    ast.fix_missing_locations(module)
    globals_dict = {"os": os, "logger": logging.getLogger(f"test.{path.stem}"), **namespace}
    exec(compile(module, str(path), "exec"), globals_dict)
    return globals_dict[name]


def _install_kr_policy(monkeypatch: pytest.MonkeyPatch, pilot_active: bool):
    calls = []
    cores = types.ModuleType("cores")
    cores.__path__ = []
    policy = types.ModuleType("cores.regime_policy")

    def active(market: str):
        calls.append(market)
        return pilot_active

    policy.pilot_reexposure_active = active
    cores.regime_policy = policy
    monkeypatch.setitem(sys.modules, "cores", cores)
    monkeypatch.setitem(sys.modules, "cores.regime_policy", policy)
    return calls


class _USPolicy:
    def __init__(self, active: bool):
        self.active = active
        self.calls = []

    def pilot_reexposure_active(self, market: str):
        self.calls.append(market)
        return self.active


CASES = [
    ("sideways", False, False, (1, 2)),
    ("sideways", False, True, (0, 2)),
    ("sideways", True, False, (1, 0)),
    ("sideways", True, True, (0, 1)),
    ("moderate_bear", True, True, (0, 1)),
    ("moderate_bull", True, True, (1, 0)),
    ("strong_bear", True, True, (0, 1)),
]


@pytest.mark.parametrize("regime,pilot,weak,expected", CASES)
def test_kr_restrictions_compose(monkeypatch, regime, pilot, weak, expected):
    calls = _install_kr_policy(monkeypatch, pilot)
    if weak:
        monkeypatch.setenv("REGIME_WEAK_NO_TOPDOWN", "true")
    else:
        monkeypatch.delenv("REGIME_WEAK_NO_TOPDOWN", raising=False)
    slots = _load_function(ROOT / "trigger_batch.py", "_get_regime_slots", {})
    assert slots(regime) == expected
    assert calls == ["kr"]


@pytest.mark.parametrize("regime,pilot,weak,expected", CASES)
def test_us_restrictions_compose(monkeypatch, regime, pilot, weak, expected):
    policy = _USPolicy(pilot)
    if weak:
        monkeypatch.setenv("REGIME_WEAK_NO_TOPDOWN", "true")
    else:
        monkeypatch.delenv("REGIME_WEAK_NO_TOPDOWN", raising=False)
    slots = _load_function(
        ROOT / "prism-us" / "us_trigger_batch.py",
        "_get_regime_slots",
        {"_load_root_regime_policy": lambda: policy},
    )
    assert slots(regime) == expected
    assert policy.calls == ["us"]
''', encoding="utf-8")

          ci_path = Path(".github/workflows/ci.yml")
          ci_text = ci_path.read_text(encoding="utf-8")
          old_ci = "      - name: Run tests\n        run: python -m pytest cores/llm/tests/ -q\n"
          new_ci = "      - name: Run tests\n        run: |\n          python -m pytest cores/llm/tests/ -q\n          python -m pytest tests/test_regime_slot_policy_composition.py -q\n"
          if new_ci not in ci_text:
              if ci_text.count(old_ci) != 1:
                  raise SystemExit(".github/workflows/ci.yml: expected test command not found exactly once")
              ci_path.write_text(ci_text.replace(old_ci, new_ci, 1), encoding="utf-8")
          PY

      - name: Run focused regression tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest tests/test_regime_slot_policy_composition.py -q
          python -m compileall -q trigger_batch.py prism-us/us_trigger_batch.py tests/test_regime_slot_policy_composition.py

      - name: Commit verified changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "autonomous-maintainer[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trigger_batch.py prism-us/us_trigger_batch.py tests/test_regime_slot_policy_composition.py .github/workflows/ci.yml
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "fix: compose regime entry-slot restrictions"
          git push origin HEAD:${GITHUB_REF_NAME}
