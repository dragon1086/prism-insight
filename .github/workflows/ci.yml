name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            pydantic \
            pyyaml \
            "openai>=2.9,<3" \
            "openai-agents==0.7.0" \
            mcp \
            pytest \
            pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest cores/llm/tests/ -q
          python -m pytest \
            tests/test_gcp_pubsub_signal_publisher_async.py \
            tests/test_redis_async_boundaries.py \
            tests/test_subscriber_trading_mode.py \
            -q
