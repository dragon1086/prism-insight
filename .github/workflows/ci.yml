name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            pydantic \
            pyyaml \
            aiohttp \
            pytz \
            "openai>=2.9,<3" \
            "openai-agents==0.7.0" \
            mcp \
            pytest \
            pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest cores/llm/tests/ -q
          python -m pytest \
            tests/test_gcp_pubsub_signal_publisher_async.py \
            tests/test_redis_async_boundaries.py \
            tests/test_subscriber_trading_mode.py \
            tests/test_chatgpt_oauth/test_token_manager_storage.py \
            tests/test_maintenance_safety_regressions.py \
            prism-us/tests/test_pending_order_batch_safety.py \
            -q

  btc:
    name: BTC offline tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install offline-test dependencies
        run: |
          pip install \
            "pandas==2.2.3" \
            "numpy==2.2.6" \
            pytest \
            requests \
            python-dotenv

      - name: Run BTC tests
        env:
          PYTHONPATH: prism-btc
        run: python -m pytest prism-btc/tests/ -q

  frontend:
    name: Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [dashboard, landing]

    defaults:
      run:
        working-directory: examples/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/${{ matrix.app }}/package-lock.json

      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build
